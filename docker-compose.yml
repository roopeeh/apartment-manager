version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: apartment-manager-db
    environment:
      POSTGRES_DB: apartment_manager
      POSTGRES_USER: appadmin
      POSTGRES_PASSWORD: ApartmentManager@2024!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appadmin -d apartment_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apartment-manager-app
    environment:
      DATABASE_URL: postgresql+asyncpg://appadmin:ApartmentManager%402024!@postgres:5432/apartment_manager
      SECRET_KEY: local-dev-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      UPLOAD_DIR: /tmp/uploads
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173","http://localhost:8000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic

volumes:
  postgres_data:
